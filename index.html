<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moon Phase Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #4a3840;
      --teal: #7aa8a4;
      --mauve: #b8747c;
      --olive: #8a9460;
      --cream: #ede4da;
      --cream-dark: #e0d5c8;
      --cream-light: #f2ebe0;
      --muted: #9a8880;
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .widget-shell {
      position: relative;
      width: 100%;
      max-width: 300px;
      background: linear-gradient(160deg, var(--cream-light) 0%, var(--cream) 55%, var(--cream-dark) 100%);
      border-radius: 3px;
      padding: 2rem 1.6rem 1.8rem;
      box-shadow:
        0 0 0 1px rgba(184,116,124,0.18),
        0 0 0 4px rgba(237,228,218,0.6),
        0 0 0 5px rgba(184,116,124,0.1),
        0 16px 48px rgba(74,56,64,0.13);
      animation: fadeUp 1s cubic-bezier(.22,.68,0,1.1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .widget-shell::before { content:''; position:absolute; top:8px; left:8px; width:22px; height:22px; border:1px solid var(--mauve); border-width:1px 0 0 1px; opacity:0.45; }
    .widget-shell::after  { content:''; position:absolute; bottom:8px; right:8px; width:22px; height:22px; border:1px solid var(--mauve); border-width:0 1px 1px 0; opacity:0.45; }
    .corner-bl { position:absolute; bottom:8px; left:8px; width:22px; height:22px; border:1px solid var(--teal); border-width:0 0 1px 1px; opacity:0.45; }
    .corner-tr { position:absolute; top:8px; right:8px; width:22px; height:22px; border:1px solid var(--teal); border-width:1px 1px 0 0; opacity:0.45; }

    .dots { position:absolute; inset:0; border-radius:3px; overflow:hidden; pointer-events:none; z-index:0; }
    .dot  { position:absolute; border-radius:50%; animation:blink var(--d,4s) ease-in-out infinite alternate; }
    @keyframes blink {
      from { opacity:var(--lo,0.05); }
      to   { opacity:var(--hi,0.2); }
    }

    .widget-inner { position:relative; z-index:1; }

    .widget-title {
      font-family:'Jost', sans-serif;
      font-size:1rem; font-weight:500;
      letter-spacing:0.3em; text-transform:uppercase;
      color:var(--teal); text-align:center;
      margin-bottom:1.2rem;
    }

    .divider { display:flex; align-items:center; gap:0.5rem; margin-bottom:1.3rem; }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(184,116,124,0.3),transparent); }
    .divider-dot  { width:4px; height:4px; border-radius:50%; background:var(--mauve); opacity:0.5; }

    .moon-wrap { display:flex; justify-content:center; margin-bottom:1.4rem; }
    .moon-svg  { filter:drop-shadow(0 4px 18px rgba(122,168,164,0.25)) drop-shadow(0 0 6px rgba(184,116,124,0.12)); }

    .moon-info { text-align:center; margin-bottom:0.3rem; }
    .phase-name {
      font-family:'Jost', sans-serif;
      font-size:1rem; font-weight:400;
      letter-spacing:0.06em; color:var(--ink);
      margin-bottom:0.3rem;
    }
    .phase-detail { font-size:0.72rem; color:var(--muted); font-weight:300; letter-spacing:0.04em; }

    .illum-bar-wrap { margin-top:1.1rem; padding:0 0.2rem; }
    .illum-label {
      display:flex; justify-content:space-between;
      font-size:0.62rem; color:var(--muted);
      font-family:'Jost', sans-serif; letter-spacing:0.08em;
      margin-bottom:0.35rem;
    }
    .illum-track { height:3px; background:rgba(74,56,64,0.1); border-radius:2px; overflow:hidden; }
    .illum-fill  { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--teal),var(--mauve)); transition:width 1.2s ease; }

    .zodiac-row {
      margin-top: 1rem;
      padding-top: 0.9rem;
      border-top: 1px solid rgba(184,116,124,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .zodiac-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .zodiac-value {
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div class="widget-shell">
  <div class="dots" id="dots"></div>
  <div class="corner-bl"></div>
  <div class="corner-tr"></div>

  <div class="widget-inner">
    <div class="widget-title">Current Moon Phase</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="moon-wrap">
      <svg class="moon-svg" id="moonSvg" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="moonClip"><circle cx="60" cy="60" r="50"/></clipPath>
          <radialGradient id="moonGlow" cx="42%" cy="38%" r="62%">
            <stop offset="0%"   stop-color="#f5f0e8"/>
            <stop offset="70%"  stop-color="#d8cfc4"/>
            <stop offset="100%" stop-color="#bfb5a8"/>
          </radialGradient>
          <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#3a2c34" stop-opacity="0.88"/>
            <stop offset="100%" stop-color="#1e1520" stop-opacity="0.96"/>
          </radialGradient>
        </defs>
        <circle cx="60" cy="60" r="50" fill="url(#moonGlow)"/>
        <g clip-path="url(#moonClip)" id="phaseShadow"></g>
        <g clip-path="url(#moonClip)" opacity="0.06">
          <circle cx="44" cy="49" r="7"  fill="#4a3840"/>
          <circle cx="72" cy="37" r="4"  fill="#4a3840"/>
          <circle cx="57" cy="73" r="5"  fill="#4a3840"/>
          <circle cx="80" cy="66" r="3"  fill="#4a3840"/>
          <circle cx="35" cy="68" r="3"  fill="#4a3840"/>
        </g>
        <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(184,116,124,0.18)" stroke-width="1"/>
      </svg>
    </div>

    <div class="moon-info">
      <div class="phase-name"  id="phaseName">—</div>
      <div class="phase-detail" id="phaseDetail">—</div>
    </div>

    <div class="illum-bar-wrap">
      <div class="illum-label">
        <span>Illumination</span>
        <span id="illumPct">—</span>
      </div>
      <div class="illum-track">
        <div class="illum-fill" id="illumFill" style="width:0%"></div>
      </div>
    </div>

    <div class="zodiac-row">
      <div class="zodiac-label">Horoscope Season</div>
      <div class="zodiac-value" id="zodiacValue">—</div>
    </div>
  </div>
</div>

<script>
// ── Astronomical moon phase calculation ───────────────────────────────────
function getMoonPhase(date) {
  // Reference new moon: 6 Jan 2000 18:14 UTC
  const known = new Date(Date.UTC(2000, 0, 6, 18, 14));
  const synodicMonth = 29.53058867;
  const diffDays = (date - known) / 86400000;
  const age = ((diffDays % synodicMonth) + synodicMonth) % synodicMonth;
  const illumination = 0.5 * (1 - Math.cos(2 * Math.PI * age / synodicMonth));

  let name, index;
  if      (age < 1.85)  { name = 'New Moon';        index = 0; }
  else if (age < 7.38)  { name = 'Waxing Crescent'; index = 1; }
  else if (age < 9.22)  { name = 'First Quarter';   index = 2; }
  else if (age < 14.77) { name = 'Waxing Gibbous';  index = 3; }
  else if (age < 16.61) { name = 'Full Moon';        index = 4; }
  else if (age < 22.15) { name = 'Waning Gibbous';  index = 5; }
  else if (age < 23.99) { name = 'Last Quarter';    index = 6; }
  else                  { name = 'Waning Crescent'; index = 7; }

  return { age, illumination, name, index };
}

// ── Draw the phase shadow as an SVG path ──────────────────────────────────
function drawPhase(index, illumination) {
  const el = document.getElementById('phaseShadow');
  const cx = 60, cy = 60, r = 50;

  if (index === 4) { el.innerHTML = ''; return; } // full moon
  if (index === 0) { el.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#shadowGrad)"/>`; return; }

  const waxing = index < 4;
  const lit = illumination;

  // Terminator ellipse x-radius
  let ex = lit <= 0.5 ? r * (1 - 2 * lit) : r * (2 * lit - 1);
  ex = Math.max(ex, 0.01);

  // Build path: dark side = semicircle + terminator ellipse
  // Waxing → lit on right, dark on left; Waning → lit on left, dark on right
  let path;
  if (waxing) {
    if (lit <= 0.5) {
      // Crescent: shadow = left half + ellipse bulges left
      path = `M ${cx} ${cy-r} A ${r} ${r} 0 0 0 ${cx} ${cy+r} A ${ex} ${r} 0 0 1 ${cx} ${cy-r} Z`;
    } else {
      // Gibbous: thin shadow on left
      path = `M ${cx} ${cy-r} A ${r} ${r} 0 0 0 ${cx} ${cy+r} A ${ex} ${r} 0 0 0 ${cx} ${cy-r} Z`;
    }
  } else {
    if (lit <= 0.5) {
      // Waning crescent: shadow = right half + ellipse bulges right
      path = `M ${cx} ${cy-r} A ${r} ${r} 0 0 1 ${cx} ${cy+r} A ${ex} ${r} 0 0 0 ${cx} ${cy-r} Z`;
    } else {
      // Waning gibbous: thin shadow on right
      path = `M ${cx} ${cy-r} A ${r} ${r} 0 0 1 ${cx} ${cy+r} A ${ex} ${r} 0 0 1 ${cx} ${cy-r} Z`;
    }
  }
  el.innerHTML = `<path d="${path}" fill="url(#shadowGrad)"/>`;
}

// ── Render ────────────────────────────────────────────────────────────────
const moon = getMoonPhase(new Date());
drawPhase(moon.index, moon.illumination);

document.getElementById('phaseName').textContent = moon.name;
document.getElementById('phaseDetail').textContent = `Day ${Math.floor(moon.age)} of 29`;

const pct = Math.round(moon.illumination * 100);
document.getElementById('illumPct').textContent = pct + '%';
setTimeout(() => { document.getElementById('illumFill').style.width = pct + '%'; }, 120);

// ── Zodiac / horoscope season ─────────────────────────────────────────────
function getZodiacSeason(date) {
  const m = date.getMonth() + 1, d = date.getDate();
  if ((m===3&&d>=21)||(m===4&&d<=19))   return 'Aries ♈';
  if ((m===4&&d>=20)||(m===5&&d<=20))   return 'Taurus ♉';
  if ((m===5&&d>=21)||(m===6&&d<=20))   return 'Gemini ♊';
  if ((m===6&&d>=21)||(m===7&&d<=22))   return 'Cancer ♋';
  if ((m===7&&d>=23)||(m===8&&d<=22))   return 'Leo ♌';
  if ((m===8&&d>=23)||(m===9&&d<=22))   return 'Virgo ♍';
  if ((m===9&&d>=23)||(m===10&&d<=22))  return 'Libra ♎';
  if ((m===10&&d>=23)||(m===11&&d<=21)) return 'Scorpio ♏';
  if ((m===11&&d>=22)||(m===12&&d<=21)) return 'Sagittarius ♐';
  if ((m===12&&d>=22)||(m===1&&d<=19))  return 'Capricorn ♑';
  if ((m===1&&d>=20)||(m===2&&d<=18))   return 'Aquarius ♒';
  return 'Pisces ♓';
}
document.getElementById('zodiacValue').textContent = getZodiacSeason(new Date());

// ── Floating decorative dots ──────────────────────────────────────────────
const colors = ['#b8747c','#7aa8a4','#8a9460','#c9a890'];
const dotsEl = document.getElementById('dots');
for (let i = 0; i < 28; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  const sz = Math.random() * 2 + 1;
  d.style.cssText = `
    width:${sz}px;height:${sz}px;
    top:${Math.random()*100}%;left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --lo:${(Math.random()*0.06).toFixed(2)};
    --hi:${(Math.random()*0.18+0.04).toFixed(2)};
    animation-delay:${(Math.random()*4).toFixed(1)}s;
  `;
  dotsEl.appendChild(d);
}
</script>
</body>
</html>
